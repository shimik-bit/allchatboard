<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <!-- TaskFlow AI - Polished horizontal logo V2 -->

  <defs>
    <!-- Subtle gradient on the U-shape for depth -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B4FF5"/>
      <stop offset="100%" stop-color="#6929D4"/>
    </linearGradient>

    <!-- Gradient for "AI" text -->
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7B3FE4"/>
      <stop offset="100%" stop-color="#FF2D8A"/>
    </linearGradient>

    <!-- Soft gradient on dots for dimension -->
    <radialGradient id="pinkDot" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#FF5FA3"/>
      <stop offset="100%" stop-color="#FF2D8A"/>
    </radialGradient>

    <radialGradient id="goldDot" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#FFC93D"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </radialGradient>
  </defs>

  <!-- Icon group - centered vertically with text baseline -->
  <g transform="translate(30, 18)">
    <!-- Pink dot (left) with subtle highlight -->
    <circle cx="50" cy="28" r="16" fill="url(#pinkDot)"/>

    <!-- Gold dot (right) with subtle highlight -->
    <circle cx="130" cy="28" r="16" fill="url(#goldDot)"/>

    <!-- Purple U-shape speech bubble with smoother curves -->
    <path d="M 25 70
             C 25 54, 38 45, 90 45
             C 142 45, 155 54, 155 70
             L 155 118
             C 155 145, 132 162, 90 162
             L 78 162
             L 64 178
             L 67 159
             C 44 153, 25 138, 25 118
             Z"
          fill="url(#purpleGrad)"/>

    <!-- Refined checkmark with better proportions -->
    <path d="M 58 108 L 80 126 L 124 80"
          stroke="white"
          stroke-width="13"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- Wordmark with refined typography -->
  <!-- "TaskFlow" in dark, balanced weight -->
  <text x="220" y="115"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="68"
        font-weight="700"
        fill="#1a1a1a"
        letter-spacing="-1.5">TaskFlow</text>

  <!-- "AI" with brand gradient and lighter weight for contrast -->
  <text x="552" y="115"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="68"
        font-weight="300"
        fill="url(#aiGrad)"
        letter-spacing="-1">AI</text>

  <!-- Refined subtitle - product categories -->
  <text x="220" y="148"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="14"
        font-weight="500"
        fill="#999"
        letter-spacing="3">MONITORING &#183; CRM &#183; DASHBOARD</text>
</svg>
